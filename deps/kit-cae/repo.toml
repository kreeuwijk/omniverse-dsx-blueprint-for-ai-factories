without an express license agreement from NVIDIA CORPORATION or
 its affiliates is strictly prohibited.
'''
[repo_format.cpp]
files.exclude = [
    "include/rtx/**"
]
[repo_format.python]
files.include = [
    "source/**",
    "scripts/**"
]
files.exclude = [
    "_build/*",
    "_compiler/*",
    "_repo/*",
    ".git/*",
    ".eggs/*",
    ".vscode/*",
    ".venv/*",
    "tools/packman/*",
    "tools/repoman/*",
    "templates/*",
    "usdSchema/tools/packman/*",
]

[repo_symstore]
enabled = false

