[core]
reloadable = false
order = -100  # Load at the start, load all schemas with order -100 (with order -1000 the USD libs are loaded)

[package]
title = "CAE Schema SimH"
version = "1.0.0"  # Semantic Versionning is used: https://semver.org/
description = "USD Schema for SimH"
category = "internal"
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"  # Icon to show in the Extension Manager
keywords = ["cae", "schema", "simh"]  # Search keywords for the Extension Manager
readme  = "docs/README.md"  # Path (relative to the root) or content of readme markdown file for UI

[dependencies]
"omni.usd.libs" = {}

[[python.module]]  # Main python module this extension provides, it will be publicly available as "import omni.cae.schema.simh"
name = "omni.cae.schema.simh"
