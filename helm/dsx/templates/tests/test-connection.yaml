apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "dsx.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dsx.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: {{ include "dsx.serviceAccountName" . }}
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget-web
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing Web UI connectivity..."
          wget --spider --timeout=5 http://{{ include "dsx.web.fullname" . }}:{{ .Values.web.service.port }}/
          echo "Web UI is reachable."
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
  restartPolicy: Never
