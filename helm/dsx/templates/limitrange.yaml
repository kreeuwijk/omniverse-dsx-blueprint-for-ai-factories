{{- if .Values.limitRange.enabled }}
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ include "dsx.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dsx.labels" . | nindent 4 }}
spec:
  limits:
    # Per-container defaults and bounds
    - type: Container
      {{- with .Values.limitRange.container.default }}
      default:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.limitRange.container.defaultRequest }}
      defaultRequest:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.limitRange.container.max }}
      max:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.limitRange.container.min }}
      min:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    # Per-PVC storage bounds
    - type: PersistentVolumeClaim
      {{- with .Values.limitRange.pvc.max }}
      max:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.limitRange.pvc.min }}
      min:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
