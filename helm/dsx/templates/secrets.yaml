{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dsx.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dsx.labels" . | nindent 4 }}
type: Opaque
data:
  nvcf-api-key: {{ .Values.secrets.nvcfApiKey | default "" | b64enc | quote }}
  sql-host: {{ .Values.secrets.sqlHost | default "" | b64enc | quote }}
  sql-database: {{ .Values.secrets.sqlDatabase | default "" | b64enc | quote }}
  sql-user: {{ .Values.secrets.sqlUser | default "" | b64enc | quote }}
  sql-password: {{ .Values.secrets.sqlPassword | default "" | b64enc | quote }}
{{- end }}
