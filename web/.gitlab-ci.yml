include:
- project: "omniverse/devplat/gitlab/templates/runners"
  file: "/modules/include.yml"
  ref: v1_latest
- project: "omniverse/devplat/gitlab/templates/common/compliance"
  file: "modules/omniverse-repo-compliance.gitlab-ci.yml"
  ref: v1_latest

.npm-common:
  image: node:20
  cache:
    paths:
      - web/node_modules/
  before_script:
    - cd web
    - cp .npmrc.ci .npmrc

stages:
  - build-web-lib
  - publish-web-lib

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_REF_PROTECTED == "true"
    - if: $CI_COMMIT_TAG

# Build the library
build-web-lib:
  extends:
    - .npm-common
  stage: build
  tags:
    - os/linux
    - type/docker
  variables:
    NODE_OPTIONS: "--max-old-space-size=4096"
  script:
    - npm install
    - npm run build:lib
  artifacts:
    paths:
      - web/dist/
    expire_in: 1 hour
  rules:
    - when: always

# Publish the library
publish-web-lib:
  extends:
    - .npm-common
  stage: deploy
  tags:
    - os/linux
    - type/docker
  needs:
    - build-web-lib
  script:
    - npm publish
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
